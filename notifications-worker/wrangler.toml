name = "picks-notifications"
main = "src/worker.js"
compatibility_date = "2024-09-23"

[triggers]
crons = ["*/3 * * * *"]

# ── KV Namespaces ─────────────────────────────────────────────────────────────
# Create these with:
#   wrangler kv namespace create SUBSCRIPTIONS
#   wrangler kv namespace create GAME_STATE
#   wrangler kv namespace create PICKS_STORE
# Then paste the returned IDs below.

[[kv_namespaces]]
binding = "SUBSCRIPTIONS"
id = "7016d022a43643ecadba0bfac7d5d547"

[[kv_namespaces]]
binding = "GAME_STATE"
id = "f3f0c06029c14ef8b6d01e326c7ea2b9"

[[kv_namespaces]]
binding = "PICKS_STORE"
id = "673db77b785c4b4b8fd4d8b9d545b490"

# ── Secrets (set with `wrangler secret put <NAME>`) ───────────────────────────
# VAPID_PRIVATE_KEY  — 32-byte P-256 private key, base64url (from generate-keys.js)
# VAPID_PUBLIC_KEY   — 65-byte uncompressed P-256 public key, base64url (same script)
# NOTIFY_SECRET      — random string; also stored in GitHub Actions secrets
# VAPID_SUBJECT      — optional, e.g. "mailto:you@example.com" (default used if unset)
