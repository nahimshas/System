name: Notify — Debrief ready

on:
  push:
    branches: [main]
    paths:
      - 'docs/debrief_latest.html'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write debrief_notify key to Cloudflare KV
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          PICKS_KV_NAMESPACE: "673db77b785c4b4b8fd4d8b9d545b490"
        run: |
          python3 - <<'PYEOF'
          import json, os, urllib.request, urllib.parse, datetime

          try:
              from zoneinfo import ZoneInfo
              today = datetime.datetime.now(ZoneInfo('America/Los_Angeles')).date().isoformat()
          except Exception:
              today = datetime.date.today().isoformat()

          token      = os.environ.get('CLOUDFLARE_API_TOKEN', '')
          account_id = os.environ.get('CLOUDFLARE_ACCOUNT_ID', '').strip()
          ns_id      = os.environ.get('PICKS_KV_NAMESPACE', '')

          if not token or not account_id or not ns_id:
              print('Missing Cloudflare credentials — skipping')
              exit(0)

          kv_key = urllib.parse.quote(f'debrief_notify:{today}', safe='')
          kv_url = f'https://api.cloudflare.com/client/v4/accounts/{account_id}/storage/kv/namespaces/{ns_id}/values/{kv_key}'

          # Dedupe on the DEBRIEF's date (from the history file), not the
          # calendar date — a same-day republish of an older debrief must not
          # block (or duplicate) the current one's notification.
          try:
              hist = json.load(open('docs/debrief_history.json'))
              debrief_date = hist['entries'][-1].get('date', today)
          except Exception:
              debrief_date = today
          try:
              chk = urllib.request.Request(kv_url, headers={'Authorization': f'Bearer {token}'})
              with urllib.request.urlopen(chk, timeout=15) as r:
                  existing = json.loads(r.read())
              if (isinstance(existing, dict) and 'title' in existing
                      and existing.get('debrief_date', '__none__') in (debrief_date, '__legacy__')):
                  print(f'already notified for debrief {debrief_date} — skipping duplicate')
                  exit(0)
              if isinstance(existing, dict) and 'title' in existing and 'debrief_date' not in existing:
                  # Legacy key without debrief_date — conservative: skip.
                  print('legacy key present — skipping to avoid double-ping')
                  exit(0)
          except Exception:
              pass   # key absent (404) or unreadable → proceed with the write

          payload = {
              'title':    '📊 Nightly Debrief ready',
              'body':     "Today's picks analyzed — tap to review",
              'url':      '/debrief_latest.html',
              'notified': False,
              'debrief_date': debrief_date,
          }

          req = urllib.request.Request(
              kv_url,
              data=json.dumps(payload).encode(),
              headers={
                  'Authorization': f'Bearer {token}',
                  'Content-Type':  'application/json',
              },
              method='PUT',
          )
          try:
              with urllib.request.urlopen(req, timeout=15) as r:
                  result = json.loads(r.read())
                  if result.get('success'):
                      print(f'debrief_notify:{today} written to KV — push notification fires on next cron tick (≤3 min)')
                  else:
                      print(f'KV write failed: {result}')
                      exit(1)
          except Exception as e:
              print(f'KV write error: {e}')
              exit(1)
          PYEOF
