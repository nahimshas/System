name: Results Snapshot

# Resolves TODAY's picks against ESPN and commits state/results_snapshot.json.
# Triggered by the nightly debrief routine right before it builds the report —
# score resolution runs as deterministic Python on GitHub's runners (which
# ESPN doesn't block) instead of inside the LLM agent.
#
# Two trigger paths because the debrief routine's sandboxed network proxy
# intermittently blocks api.github.com (workflow_dispatch) while plain git
# push to github.com keeps working. The push trigger on state/.snapshot_trigger
# is the reliable fallback: the routine just commits a timestamp to that file.

on:
  workflow_dispatch:
  push:
    paths:
      - 'state/.snapshot_trigger'

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve today's picks against ESPN (+ CLV capture)
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          DISABLE_CLV_STAMPING: ${{ vars.DISABLE_CLV_STAMPING || 'false' }}
        run: python -m src.data.results_snapshot

      - name: Commit snapshot
        run: |
          git config user.name "results-snapshot-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state/results_snapshot.json state/shadow_log/ state/decision_log/ state/bankroll.json
          git diff --cached --quiet || git commit -m "Results snapshot: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase
          git push
