name: Results Snapshot

# Resolves TODAY's picks against ESPN and commits state/results_snapshot.json.
# Triggered by the nightly debrief routine right before it builds the report —
# score resolution runs as deterministic Python on GitHub's runners (which
# ESPN doesn't block) instead of inside the LLM agent.
#
# Two trigger paths because the debrief routine's sandboxed network proxy
# intermittently blocks api.github.com (workflow_dispatch) while plain git
# push to github.com keeps working. The push trigger on state/.snapshot_trigger
# is the reliable fallback: the routine just commits a timestamp to that file.

on:
  workflow_dispatch:
  push:
    paths:
      - 'state/.snapshot_trigger'
  schedule:
    # Nightly failsafe (added Jul 7 2026): the debrief routine's sandbox lost
    # git write access (platform moved routines to a PR-based model), so it can
    # no longer reliably push the .snapshot_trigger. This cron guarantees the
    # snapshot + CLV capture run nightly regardless of the routine's health.
    # 05:45 UTC = 10:45 PM PDT (9:45 PM PST in winter — still after most games).
    #
    # Second cron (added Jul 8): GitHub delays/skips scheduled runs under load
    # (Jul 7's 05:45 cron started 07:59 — 2h14m late). The 06:45 retry makes a
    # severely-delayed or skipped first run a 1-hour delay instead of a no-show.
    # Both passes are idempotent (snapshot re-resolves, CLV skips stamped rows,
    # debrief republish is deduped, notification is deduped by KV key).
    - cron: '45 5 * * *'
    - cron: '45 6 * * *'

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve today's picks against ESPN (+ CLV capture)
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          DISABLE_CLV_STAMPING: ${{ vars.DISABLE_CLV_STAMPING || 'false' }}
        run: python -m src.data.results_snapshot

      - name: Build debrief page (deterministic)
        # Publishes docs/debrief_latest.html + docs/debrief_history.json from the
        # fresh snapshot — no LLM required. The Claude routine lost all write
        # access (platform redacts prompt secrets + blocks sandbox writes), so
        # this is the path that keeps the PWA debrief + Signal Scorecard alive.
        # Skips (exit 0) when nothing has settled yet.
        id: debrief
        run: |
          python -m src.report.debrief_builder | tee /tmp/debrief_out.txt
          if grep -q "debrief built" /tmp/debrief_out.txt; then
            echo "built=true" >> "$GITHUB_OUTPUT"
          else
            echo "built=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit snapshot
        run: |
          git config user.name "results-snapshot-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state/results_snapshot.json state/shadow_log/ state/decision_log/ state/bankroll.json docs/debrief_latest.html docs/debrief_history.json
          git diff --cached --quiet || git commit -m "Results snapshot: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase
          git push

      - name: Debrief push notification
        # Sent from THIS workflow because pushes made with the built-in
        # GITHUB_TOKEN do not trigger other workflows (GitHub anti-recursion) —
        # notify_debrief.yml never fires for our own push. Dedupe: skips if
        # today's key already exists, so re-runs/republishes ping only once.
        if: steps.debrief.outputs.built == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          PICKS_KV_NAMESPACE: "673db77b785c4b4b8fd4d8b9d545b490"
        run: |
          python3 - <<'PYEOF'
          import json, os, urllib.request, urllib.parse, datetime
          try:
              from zoneinfo import ZoneInfo
              today = datetime.datetime.now(ZoneInfo('America/Los_Angeles')).date().isoformat()
          except Exception:
              today = datetime.date.today().isoformat()
          token = os.environ.get('CLOUDFLARE_API_TOKEN', '')
          acct  = os.environ.get('CLOUDFLARE_ACCOUNT_ID', '').strip()
          ns    = os.environ.get('PICKS_KV_NAMESPACE', '')
          if not token or not acct or not ns:
              print('Missing Cloudflare credentials — skipping')
              raise SystemExit(0)
          key = urllib.parse.quote(f'debrief_notify:{today}', safe='')
          url = (f'https://api.cloudflare.com/client/v4/accounts/{acct}'
                 f'/storage/kv/namespaces/{ns}/values/{key}')
          try:
              chk = urllib.request.Request(url, headers={'Authorization': f'Bearer {token}'})
              with urllib.request.urlopen(chk, timeout=15) as r:
                  existing = json.loads(r.read())
              if isinstance(existing, dict) and 'title' in existing:
                  print(f'debrief_notify:{today} already exists — skipping duplicate')
                  raise SystemExit(0)
          except SystemExit:
              raise
          except Exception:
              pass
          payload = {'title': '\U0001f4ca Nightly Debrief ready',
                     'body': "Today's picks analyzed — tap to review",
                     'url': '/debrief_latest.html', 'notified': False}
          req = urllib.request.Request(url, data=json.dumps(payload).encode(),
              headers={'Authorization': f'Bearer {token}',
                       'Content-Type': 'application/json'}, method='PUT')
          with urllib.request.urlopen(req, timeout=15) as r:
              print(json.loads(r.read()))
          print(f'debrief_notify:{today} written — worker fires within ~1 min')
          PYEOF
