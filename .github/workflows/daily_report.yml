name: Daily Betting Report

on:
  # schedule: disabled — GitHub cron is unreliable (1-5 hr delays on free tier).
  # Triggered at exactly 9:00 AM PDT via cron-job.org → GitHub workflow_dispatch API.
  workflow_dispatch:
    inputs:
      league:
        description: "League to analyze (leave blank for all)"
        required: false
        type: choice
        options:
          - ""
          - nba
          - mlb
          - nfl
          - nhl
          - ipl
          - wnba
          - mls
        default: ""
      reset_state:
        description: "Delete today's state file and rebuild picks from scratch"
        required: false
        type: boolean
        default: false
      no_email:
        description: "Skip sending the email (useful for test/debug runs)"
        required: false
        type: boolean
        default: false
      reevaluate_picks:
        description: "Re-evaluate unlocked picks and replace any that are no longer top options"
        required: false
        type: boolean
        default: false
      code_only:
        description: "Re-render report from saved state only — no Odds API calls (use for visual/template deploys)"
        required: false
        type: boolean
        default: false

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Python
        uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore state from most recent commit
        run: |
          # Restore state/ from whichever commit touched it most recently —
          # bot OR user.  This means:
          #   • Normal runs: bot's last report commit is newest → used as-is.
          #   • After a manual state fix pushed by the user: user's commit is
          #     newer than the last bot commit → user's fix wins correctly.
          # The original bot-only filter caused user state patches to be silently
          # discarded.  Using the overall latest commit is strictly correct because
          # git history is linear: whoever committed last has the freshest data.
          git fetch --unshallow 2>/dev/null || git fetch origin
          LAST_SHA=$(git log --format="%H" -- state/ | head -1)
          if [ -n "$LAST_SHA" ]; then
            git checkout "$LAST_SHA" -- state/ 2>/dev/null || true
            echo "Restored state/ from commit $LAST_SHA"
          else
            echo "No previous commit found for state/ — using checkout as-is"
          fi

      - name: Reset state (if requested)
        if: ${{ github.event.inputs.reset_state == 'true' }}
        run: |
          TODAY=$(TZ=America/Los_Angeles date +'%Y-%m-%d')
          rm -f "state/picks_${TODAY}.json"
          echo "State reset: deleted state/picks_${TODAY}.json (if it existed)"

      - name: Run betting analysis
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          DAILY_BUDGET: ${{ vars.DAILY_BUDGET || '100' }}
        run: |
          LEAGUE_ARG=""
          if [ -n "${{ github.event.inputs.league }}" ]; then
            LEAGUE_ARG="--league ${{ github.event.inputs.league }}"
          fi
          NO_EMAIL_ARG=""
          if [ "${{ github.event.inputs.no_email }}" = "true" ]; then
            NO_EMAIL_ARG="--no-email"
          fi
          REEVALUATE_ARG=""
          if [ "${{ github.event.inputs.reevaluate_picks }}" = "true" ]; then
            REEVALUATE_ARG="--reevaluate"
          fi
          CODE_ONLY_ARG=""
          if [ "${{ github.event.inputs.code_only }}" = "true" ]; then
            CODE_ONLY_ARG="--code-only"
          fi
          python -m src.main $LEAGUE_ARG $NO_EMAIL_ARG $REEVALUATE_ARG $CODE_ONLY_ARG

      - name: Notify subscribers — picks ready
        # Only on real morning runs (not code-only re-renders).
        # Writes picks directly to Cloudflare KV via the REST API —
        # bypasses workers.dev Bot Fight Mode entirely.
        # The picks-ready broadcast is sent by the cron on its first
        # run after the KV write (broadcast_done flag pattern).
        if: ${{ github.event.inputs.code_only != 'true' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          PICKS_KV_NAMESPACE:   "673db77b785c4b4b8fd4d8b9d545b490"
        run: |
          python3 - <<'PYEOF'
          import json, os, urllib.request, datetime

          # Determine today's date in LA time (same as main.py)
          try:
              from zoneinfo import ZoneInfo
              today = datetime.datetime.now(ZoneInfo('America/Los_Angeles')).date().isoformat()
          except Exception:
              today = datetime.date.today().isoformat()

          state_path = f'state/picks_{today}.json'
          try:
              with open(state_path) as f:
                  state = json.load(f)
          except FileNotFoundError:
              print(f'No state file at {state_path} — skipping')
              exit(0)

          token      = os.environ.get('CLOUDFLARE_API_TOKEN', '')
          ns_id      = os.environ.get('PICKS_KV_NAMESPACE', '')
          if not token or not ns_id:
              print('CLOUDFLARE_API_TOKEN or PICKS_KV_NAMESPACE not set — skipping')
              exit(0)

          # Resolve account ID from the API token
          def cf_get(path):
              req = urllib.request.Request(
                  f'https://api.cloudflare.com/client/v4{path}',
                  headers={'Authorization': f'Bearer {token}', 'Content-Type': 'application/json'},
              )
              with urllib.request.urlopen(req, timeout=15) as r:
                  return json.loads(r.read())

          accounts = cf_get('/accounts?per_page=1').get('result', [])
          if not accounts:
              print('Could not resolve Cloudflare account ID — skipping')
              exit(0)
          account_id = accounts[0]['id']

          singles_display = state.get('singles_display', [])
          # state['singles'] = 5 budget-allocated Today's Card picks
          # state['singles_display'] = all analyzed picks for main sports (MLB/NBA/NHL/NFL)
          # Watchlist sports (WNBA/MLS/IPL) have their own separate display lists
          today_card  = state.get('singles', singles_display)
          parlays     = state.get('parlays', [])
          props       = state.get('props_display', [])

          def _key(s):
              return (s.get('sport',''), s.get('home_team',''), s.get('away_team',''),
                      s.get('bet_type',''), s.get('pick',''))
          today_card_keys = {_key(s) for s in today_card}

          pick_count = len(today_card)
          prop_count = len([p for p in props if not p.get('locked')])

          # Build the per-tab display list — matching exactly what each tab shows.
          #   MLB / NBA / NFL  → top 5 by edge, deduped by (home, away, bet_type)
          #   NHL              → all picks from singles_display (uncapped watchlist)
          #   WNBA / MLS / IPL → separate state keys (already tab-ready)
          MAX_TAB = 5
          def top_for_sport(sport, pool, max_n=MAX_TAB):
              picks = sorted(
                  [s for s in pool if s.get('sport') == sport],
                  key=lambda x: x.get('edge_pct', x.get('edge', 0)), reverse=True,
              )
              seen, out = set(), []
              for p in picks:
                  dk = (p.get('home_team',''), p.get('away_team',''), p.get('bet_type',''))
                  if dk not in seen:
                      seen.add(dk)
                      out.append(p)
                  if len(out) >= max_n:
                      break
              return out

          tab_picks = (
              top_for_sport('MLB', singles_display) +
              top_for_sport('NBA', singles_display) +
              top_for_sport('NFL', singles_display) +
              [s for s in singles_display if s.get('sport') == 'NHL'] +  # watchlist, uncapped
              state.get('wnba_display', []) +
              state.get('mls_display',  []) +
              state.get('ipl_display',  [])
          )

          # Build singles with all fields the worker needs for game tracking.
          # inTodaysCard is only true for the 5 budget picks (state['singles']).
          stored_singles = [
              {
                  'id':           f's{i}',
                  'sport':        s['sport'],
                  'homeTeam':     s['home_team'],
                  'awayTeam':     s['away_team'],
                  'pick':         s['pick'],
                  'betType':      s['bet_type'],
                  'cost':         s.get('total_cost', 0),
                  'profitIfWin':  s.get('profit_if_win', 0),
                  'commenceTime': s.get('commence_time', ''),
                  'inTodaysCard': _key(s) in today_card_keys,
                  'isParlay':     False,
                  'espnEventId':  None,
              }
              for i, s in enumerate(tab_picks)
          ]

          # Build parlays + flat parlay_legs array the worker expects
          parlay_legs = []
          stored_parlays = []
          for pi, p in enumerate(parlays):
              parlay_id    = f'parlay-{pi}'
              label        = p.get('label', f'Parlay {pi+1}')
              p_cost       = p.get('total_cost', 0)
              p_profit     = p.get('profit_if_win', 0)
              raw_legs     = p.get('legs', [])
              stored_legs  = []
              for li, leg in enumerate(raw_legs):
                  leg_obj = {
                      'id':           f'p{pi}-l{li}',
                      'parlayId':     parlay_id,
                      'parlayLabel':  label,
                      'legNum':       li + 1,
                      'legTotal':     len(raw_legs),
                      'sport':        leg['sport'],
                      'homeTeam':     leg['home_team'],
                      'awayTeam':     leg['away_team'],
                      'pick':         leg['pick'],
                      'betType':      leg['bet_type'],
                      'commenceTime': leg.get('commence_time', ''),
                      'cost':         p_cost,
                      'profitIfWin':  p_profit,
                      'isParlay':     True,
                      'inTodaysCard': True,
                      'espnEventId':  None,
                  }
                  parlay_legs.append(leg_obj)
                  stored_legs.append(leg_obj)
              stored_parlays.append({
                  'id':             parlay_id,
                  'label':          label,
                  'cost':           p_cost,
                  'profitIfWin':    p_profit,
                  'legs':           stored_legs,
                  'notifiedFinal':  False,
              })

          payload = {
              'date':        today,
              'pickCount':   pick_count,
              'propCount':   prop_count,
              'singles':     stored_singles,
              'parlay_legs': parlay_legs,
              'parlays':     stored_parlays,
          }

          # Write picks directly to KV (bypasses workers.dev Bot Fight Mode)
          kv_url  = f'https://api.cloudflare.com/client/v4/accounts/{account_id}/storage/kv/namespaces/{ns_id}/values/picks:{today}'
          kv_data = json.dumps(payload).encode()
          kv_req  = urllib.request.Request(
              kv_url, data=kv_data,
              headers={'Authorization': f'Bearer {token}', 'Content-Type': 'application/json'},
              method='PUT',
          )
          try:
              with urllib.request.urlopen(kv_req, timeout=15) as r:
                  result = json.loads(r.read())
                  if result.get('success'):
                      by_sport = {}
                      for s in stored_singles:
                          by_sport[s['sport']] = by_sport.get(s['sport'], 0) + 1
                      sport_str = ', '.join(f'{sp}:{n}' for sp, n in sorted(by_sport.items()))
                      print(f'Picks stored in KV: {pick_count} Today\'s Card, {len(stored_singles)} tab picks ({sport_str}), {len(parlay_legs)} parlay legs ({today})')
                      print('Picks-ready broadcast will fire on next cron tick (≤3 min)')
                  else:
                      print(f'KV write failed: {result}')
          except Exception as e:
              print(f'KV write failed (non-fatal): {e}')
          PYEOF

      - name: Commit updated report and state to repo
        run: |
          cp docs/index.html /tmp/report.html
          cp docs/index_spa.html /tmp/report_spa.html
          cp -r state /tmp/state 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git reset --hard origin/main
          cp /tmp/report.html docs/index.html
          cp /tmp/report_spa.html docs/index_spa.html
          mkdir -p state
          cp -r /tmp/state/. state/ 2>/dev/null || true
          git add docs/index.html docs/index_spa.html state/
          git diff --cached --quiet || git commit -m "Report: $(date +'%Y-%m-%d %H:%M UTC')"
          git push
